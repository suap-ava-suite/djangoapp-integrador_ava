apiVersion: v1
kind: Service
metadata:
  name: integrador
  labels:
    {{- include "integrador.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "integrador.selectorLabels" . | nindent 4 }}
