name: QA

on:
  push:
    branches:
      - "*"
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Check Python formatting (black)
        run: |
          black . --check


      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23

      - name: Lint reStructuredText (doc8)
        run: |
          doc8 docs --max-line-length=120

      - name: Run Semgrep SAST
        if: github.event_name == 'pull_request' || github.event_name == 'schedule'
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: p/ci

  test:
    runs-on: ubuntu-latest
    needs: quality
    env:
      POSTGRES_ENGINE: django.db.backends.postgresql
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: integrador
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DJANGO_CACHES_DEFAULT_BACKEND: django.core.cache.backends.dummy.DummyCache
      SUAP_INTEGRADOR_KEY: test
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: integrador
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d integrador"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Debug files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -name manage.py

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Install project dependencies
        run: pip install -e .


      - name: Test with coverage
        run: |
          cd src
          coverage run -m pytest --ds=settings --junitxml=junit.xml
          coverage xml -o coverage.xml
          coverage html
          coverage report --fail-under=95
          # ./check_coverage_gate.py --coverage-xml /app/src/coverage.xml --baseline-file /app/src/.coverage-baseline --min 98 --ideal 100 --write-baseline
          # pytest-coverage-gate --coverage-xml=coverage.xml --baseline=.coverage-baseline

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-py${{ matrix.python-version }}
          path: |
            src/htmlcov/
            src/coverage.xml
            src/.coverage
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 #v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: cte-zl-ifrn/integration-integrador_ava

  build-and-push:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set version in project.py
      run: |
        sed -i 's/"PROJECT_VERSION", ".*"/"PROJECT_VERSION", "${{ github.ref_name }}"/' src/settings/project.py

    - name: Log in to Docker Hub
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        push: true
        tags: ctezlifrn/avaintegrador:${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
        target: production
