name: QA

on:
  push:
    branches:
      - "*"
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Check Python formatting (black)
        run: |
          black . --check


      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23

      - name: Lint reStructuredText (doc8)
        run: |
          doc8 docs --max-line-length=120

      - name: Run Semgrep SAST
        if: github.event_name == 'pull_request' || github.event_name == 'schedule'
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci

  test:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: integrador
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d integrador"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Install project dependencies
        run: pip install -e .


      - name: Test with coverage
        run: |
          coverage run manage.py test --verbosity 1
          coverage report --fail-under=98
          coverage xml -o coverage.xml
          coverage html
          ./check_coverage_gate.py --coverage-xml /app/src/coverage.xml --baseline-file /app/src/.coverage-baseline --min 98 --ideal 100 --write-baseline
          pytest-coverage-gate --coverage-xml=coverage.xml --baseline=.coverage-baseline

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-py${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
            .coverage
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: false
  build-and-push:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set version in project.py
      run: |
        sed -i 's/"PROJECT_VERSION", ".*"/"PROJECT_VERSION", "${{ github.ref_name }}"/' src/settings/project.py

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ctezlifrn/avaintegrador:${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
        target: production
