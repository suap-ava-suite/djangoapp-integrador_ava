name: Full cicle

on:
  push:
    branches:
      - main
    tags:
      - '*'  # Ativa a esteira quando qualquer tag for criada (necessário para hmg e prod)
  release:
    types: [published]
  workflow_dispatch:


permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAIN_IMAGE: ctezlifrn/avaintegrador

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Check Python formatting (black)
        run: |
          black . --check


      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23

      - name: Lint reStructuredText (doc8)
        run: |
          doc8 docs --max-line-length=120

      - name: Run Semgrep SAST
        if: github.event_name == 'pull_request' || github.event_name == 'schedule'
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: p/ci

  unit-tests:
    runs-on: ubuntu-latest
    needs: static-analysis
    env:
      POSTGRES_ENGINE: django.db.backends.postgresql
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: integrador
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DJANGO_CACHES_DEFAULT_BACKEND: django.core.cache.backends.dummy.DummyCache
      SUAP_INTEGRADOR_KEY: changeme
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: integrador
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d integrador"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Debug files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -name manage.py

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Install project dependencies
        run: pip install -e .


      - name: Test with coverage
        run: |
          cd src
          coverage run -m pytest --ds=settings --junitxml=junit.xml
          coverage xml -o coverage.xml
          coverage html
          coverage report --fail-under=95

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-py
          path: |
            src/htmlcov/
            src/coverage.xml
            src/.coverage
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 #v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: cte-zl-ifrn/integration-integrador_ava

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      POSTGRES_ENGINE: django.db.backends.postgresql
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: integrador
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DJANGO_CACHES_DEFAULT_BACKEND: django.core.cache.backends.dummy.DummyCache
      SUAP_INTEGRADOR_KEY: test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Run Integration Tests
        run: |
          docker compose -f tests_integration/docker-compose.integration.yml up --build test-integration --exit-code-from test-integration

  publish-to-dockerhub:
    runs-on: ubuntu-latest
    needs: integration-tests
    # Só builda a imagem se os testes passarem E se o gatilho for uma tag do git
    if: |
      always() && needs.integration-tests.result == 'success' &&
      startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ vars.DOCKERHUB_HOST }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ vars.DOCKERHUB_HOST }}/${{ env.MAIN_IMAGE }}:${{ github.ref_name }}

  deploy-to-test:
    runs-on: [self-hosted, runner-dead]
    needs: publish-to-dockerhub
    # Filtra estritamente para rodar apenas se a tag terminar com '-test'
    if: |
      always() && needs.publish-to-dockerhub.result == 'success' &&
      startsWith(github.ref, 'refs/tags/') && endsWith(github.ref_name, '-test')
    environment:
      name: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.K8S_HOST }} >> ~/.ssh/known_hosts

      - name: Enviar Chart do Helm
        run: |
          ssh root@${{ secrets.K8S_HOST }} "rm -rf /tmp/integrador-chart"
          scp -r ./helm root@${{ secrets.K8S_HOST }}:/tmp/integrador-chart

      - name: Executar Upgrade no Helm
        run: |
          # Correção essencial aplicada aqui: garante o pull correto separando as propriedades
          ssh root@${{ secrets.K8S_HOST }} "
            helm upgrade --install integrador /tmp/integrador-chart \
              --namespace ava \
              --set image.repository=${{ vars.DOCKERHUB_HOST }}/${{ env.MAIN_IMAGE }} \
              --set image.tag=${{ github.ref_name }}
          "

  deploy-to-prod:
    runs-on: [self-hosted, runner-dead]
    needs: publish-to-dockerhub
    # Filtra estritamente para rodar se for uma tag que NÃO possui o sufixo '-test'
    if: |
      always() && needs.publish-to-dockerhub.result == 'success' &&
      startsWith(github.ref, 'refs/tags/') && !endsWith(github.ref_name, '-test')
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Executar Upgrade no Helm
        run: |
          ssh root@${{ vars.DOCKERHUB_HOST }} "sed -i 's/avaintegrador.*/avaintegrador:${{ github.ref_name }}/g' /var/dockers/docker-compose.yml"
          ssh root@${{ vars.DOCKERHUB_HOST }} "cd /var/dockers && docker compose pull && docker compose down integrador && docker compose up -d integrador && docker compose logs -f integrador"
