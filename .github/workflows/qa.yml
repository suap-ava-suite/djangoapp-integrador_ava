name: Full cicle

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAIN_IMAGE: ctezlifrn/avaintegrador

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Check Python formatting (black)
        run: |
          black . --check


      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23

      - name: Lint reStructuredText (doc8)
        run: |
          doc8 docs --max-line-length=120

      - name: Run Semgrep SAST
        if: github.event_name == 'pull_request' || github.event_name == 'schedule'
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: p/ci

  test:
    runs-on: ubuntu-latest
    needs: quality
    env:
      POSTGRES_ENGINE: django.db.backends.postgresql
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: integrador
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DJANGO_CACHES_DEFAULT_BACKEND: django.core.cache.backends.dummy.DummyCache
      SUAP_INTEGRADOR_KEY: changeme
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: integrador
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d integrador"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Debug files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -name manage.py

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Install project dependencies
        run: pip install -e .


      - name: Test with coverage
        run: |
          cd src
          coverage run -m pytest --ds=settings --junitxml=junit.xml
          coverage xml -o coverage.xml
          coverage html
          coverage report --fail-under=95
          # ./check_coverage_gate.py --coverage-xml /app/src/coverage.xml --baseline-file /app/src/.coverage-baseline --min 98 --ideal 100 --write-baseline
          # pytest-coverage-gate --coverage-xml=coverage.xml --baseline=.coverage-baseline

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-py
          path: |
            src/htmlcov/
            src/coverage.xml
            src/.coverage
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 #v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: cte-zl-ifrn/integration-integrador_ava

  integration:
    runs-on: ubuntu-latest
    needs: test
    env:
      POSTGRES_ENGINE: django.db.backends.postgresql
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: integrador
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DJANGO_CACHES_DEFAULT_BACKEND: django.core.cache.backends.dummy.DummyCache
      SUAP_INTEGRADOR_KEY: test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Run Integration Tests
        run: |
          docker compose -f tests_integration/docker-compose.integration.yml up --build test-integration --exit-code-from test-integration

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKERHUB_HOST }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ vars.DOCKERHUB_HOST }}/${{ env.MAIN_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: [self-hosted, runner-dead]
    needs: build-and-push
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.K8S_HOST }} >> ~/.ssh/known_hosts

      - name: Enviar Chart do Helm
        run: |
          ssh root@${{ secrets.K8S_HOST }} "rm -rf /tmp/integrador-chart"
          scp -r ./helm root@${{ secrets.K8S_HOST }}:/tmp/integrador-chart

      - name: Executar Upgrade no Helm
        run: |
          ssh root@${{ secrets.K8S_HOST }} "
            helm upgrade --install integrador /tmp/integrador-chart \
              --namespace ava \
              --set image.tag=${{ github.sha }} \
              --set image.repository=${{ vars.DOCKERHUB_HOST }}/${{ env.MAIN_IMAGE }}
          "
