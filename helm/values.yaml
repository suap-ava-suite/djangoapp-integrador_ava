global:
  namespace: ava

replicaCount: 1

image:
  repository: ctezlifrn/avaintegrador
  tag: 1.1.039
  pullPolicy: Always

securityContext:
  runAsUser: 0

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

vault:
  enabled: true
  secretName: "integrador-secrets"
  secretStoreRef: "vault-backend-v2"
  vaultpaths:
    - "dbs-ava/integrador"
    - "ava/integrador"

postgres:
  enabled: true
  host: "postgres.storage.svc.cluster.local"
  name: "integrador"
  user: "postgres"
  port: 5432

redis:
  enabled: true
  host: "valkey.storage.svc.cluster.local"
  port: 6379
  database: "2"

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: integrador.ead.ifrn.edu.br
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: integrador-tls
      hosts:
        - integrador.ead.ifrn.edu.br

autoscaling:
  enabled: false

serviceAccount:
  create: false

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: app-placement
              operator: NotIn
              values:
                - infra-k8s