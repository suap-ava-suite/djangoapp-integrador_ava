default_stages: [pre-commit]
exclude: ^src/htmlcov/

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: check-ast
  - id: check-builtin-literals
  - id: check-case-conflict
  - id: check-docstring-first
  - id: check-executables-have-shebangs
  - id: check-merge-conflict
  - id: check-shebang-scripts-are-executable
  - id: check-symlinks
  - id: check-toml
  - id: check-vcs-permalinks
  - id: check-xml
  - id: check-yaml
  - id: debug-statements
  - id: destroyed-symlinks
  - id: fix-byte-order-marker
  - id: mixed-line-ending
  - id: name-tests-test
    args: [--pytest-test-first]
  - id: requirements-txt-fixer
  - id: end-of-file-fixer
    exclude: ^tests_integration/fixtures/060\.moodle\.sql$
  - id: trailing-whitespace
    args: [--markdown-linebreak-ext=md]
    exclude: ^tests_integration/fixtures/060\.moodle\.sql$
  - id: detect-private-key
    exclude: ^tests_integration/fixtures/060\.moodle\.sql$


- repo: https://github.com/psf/black
  rev: 26.3.1
  hooks:
  - id: black

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.11
  hooks:
  - id: ruff
    args: [--fix]

- repo: https://github.com/PyCQA/doc8
  rev: v2.0.0
  hooks:
  - id: doc8
    args: ["--max-line-length=120"]

- repo: https://github.com/igorshubovych/markdownlint-cli
  rev: v0.48.0
  hooks:
  - id: markdownlint
    args: ["--fix"]

- repo: https://github.com/rtts/djhtml
  rev: 3.0.11
  hooks:
  - id: djhtml
    files: \.html$
    exclude: ^(migrations|static|media)/

- repo: local
  hooks:
    - id: pytest-coverage-gate
      name: pytest-coverage-gate
      stages: [pre-push]
      entry: ava test integrador pytest --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing
      language: system
      pass_filenames: false
      always_run: true

    - id: integration-test
      name: integration-test
      stages: [pre-push]
      entry: docker compose -f tests_integration/docker-compose.integration.yml up --build test-integration --exit-code-from test-integration
      language: system
      pass_filenames: false
      always_run: true
